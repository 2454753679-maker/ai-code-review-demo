- name: Run AI Review
  env:
    DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
  run: python review.py
  continue-on-error: true

- name: Read review result
  id: review
  run: |
    if [ -f review_result.txt ]; then
      CONTENT=$(base64 -w 0 review_result.txt)
      echo "result=$CONTENT" >> $GITHUB_OUTPUT
    else
      echo "result=FAILED" >> $GITHUB_OUTPUT
    fi

- name: Comment on PR
  if: always()
  uses: peter-evans/create-or-update-comment@v4
  with:
    token: ${{ secrets.GITHUB_TOKEN }}
    body: |
      ### 🤖 AI代码评审结果
      ${{ fromBase64(steps.review.outputs.result) }}