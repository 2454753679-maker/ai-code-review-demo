name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai_review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI Review
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python review.py

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### AI 代码评审结果
            $(cat review_result.txt)

      - name: Fail on low score
        run: |
          SCORE=$(grep -oP "评分.*?(\d)" review_result.txt | grep -oP "\d")
          echo "AI评分：$SCORE"
          if [ "$SCORE" -lt 4 ]; then
            echo "❌ AI评分低于4分，阻止合并"
            exit 1
          fi